<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards — Fundamentos del Diseño</title>
  <meta name="description"
    content="Tarjetas didácticas interactivas sobre Fundamentos del Diseño basadas en Gui Bonsiepe.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS RESET & VARIABLES ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font: 'Inter', system-ui, sans-serif;
      --radius: 20px;
      --radius-sm: 12px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Dark theme (default) */
    [data-theme="dark"] {
      --bg-gradient-1: #0a1628;
      --bg-gradient-2: #0d2b3e;
      --bg-gradient-3: #0a3a2a;
      --card-bg: rgba(45, 55, 72, 0.85);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 80px rgba(59, 130, 246, 0.06);
      --text-primary: #f0f4f8;
      --text-secondary: rgba(203, 213, 225, 0.7);
      --text-muted: rgba(148, 163, 184, 0.5);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.25);
      --nav-bg: rgba(30, 41, 59, 0.7);
      --nav-hover: rgba(59, 130, 246, 0.2);
      --progress-bg: rgba(255, 255, 255, 0.1);
      --progress-fill: #3b82f6;
      --overlay-bg: rgba(5, 10, 20, 0.85);
      --input-bg: rgba(30, 41, 59, 0.8);
      --input-border: rgba(59, 130, 246, 0.3);
      --success-bg: rgba(16, 185, 129, 0.15);
      --success-border: rgba(16, 185, 129, 0.4);
      --success-text: #6ee7b7;
      --star-color: rgba(250, 204, 21, 0.6);
      --explanation-bg: rgba(59, 130, 246, 0.08);
      --explanation-border: rgba(59, 130, 246, 0.2);
      --toggle-bg: rgba(30, 41, 59, 0.7);
    }

    /* Light theme */
    [data-theme="light"] {
      --bg-gradient-1: #e8edf5;
      --bg-gradient-2: #dce8f0;
      --bg-gradient-3: #d5ede3;
      --card-bg: rgba(255, 255, 255, 0.92);
      --card-border: rgba(0, 0, 0, 0.08);
      --card-shadow: 0 25px 60px rgba(0, 0, 0, 0.1), 0 0 80px rgba(59, 130, 246, 0.05);
      --text-primary: #1e293b;
      --text-secondary: rgba(51, 65, 85, 0.7);
      --text-muted: rgba(100, 116, 139, 0.5);
      --accent: #2563eb;
      --accent-glow: rgba(37, 99, 235, 0.15);
      --nav-bg: rgba(255, 255, 255, 0.7);
      --nav-hover: rgba(37, 99, 235, 0.12);
      --progress-bg: rgba(0, 0, 0, 0.08);
      --progress-fill: #2563eb;
      --overlay-bg: rgba(241, 245, 249, 0.92);
      --input-bg: rgba(255, 255, 255, 0.9);
      --input-border: rgba(37, 99, 235, 0.3);
      --success-bg: rgba(16, 185, 129, 0.1);
      --success-border: rgba(16, 185, 129, 0.3);
      --success-text: #059669;
      --star-color: rgba(234, 179, 8, 0.7);
      --explanation-bg: rgba(37, 99, 235, 0.06);
      --explanation-border: rgba(37, 99, 235, 0.15);
      --toggle-bg: rgba(255, 255, 255, 0.7);
    }

    /* ===== BODY ===== */
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }

    /* ===== THEME TOGGLE ===== */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      background: var(--toggle-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      padding: 8px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-family: var(--font);
      transition: all var(--transition);
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* ===== NICKNAME SCREEN ===== */
    .screen {
      display: none;
      width: 100%;
      height: 100%;
    }

    .screen.active {
      display: flex;
    }

    #nickname-screen {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 28px;
    }

    .nickname-box {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--card-shadow);
      text-align: center;
      max-width: 440px;
      width: 90%;
      animation: fadeScaleIn 0.6s ease;
    }

    .nickname-box h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nickname-box .subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .nickname-box label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: left;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .nickname-box input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1.3rem;
      font-family: var(--font);
      font-weight: 600;
      letter-spacing: 0.15em;
      text-align: center;
      background: var(--input-bg);
      border: 2px solid var(--input-border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition);
    }

    .nickname-box input:focus {
      border-color: var(--accent);
    }

    .nickname-box input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .nickname-box .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: left;
    }

    .btn-start {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--font);
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-start:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-start:not(:disabled):hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    /* ===== GAME SCREEN ===== */
    #game-screen {
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      height: 100%;
    }

    /* Top hint */
    .top-hint {
      font-size: 0.82rem;
      color: var(--text-secondary);
      text-align: center;
      padding: 8px 0 4px;
      user-select: none;
      flex-shrink: 0;
    }

    .top-hint kbd {
      display: inline-block;
      padding: 2px 7px;
      font-size: 0.78rem;
      font-family: var(--font);
      background: var(--nav-bg);
      border: 1px solid var(--card-border);
      border-radius: 5px;
      margin: 0 2px;
    }

    /* Card area */
    .card-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
      max-width: 900px;
      min-height: 0;
    }

    /* Nav buttons */
    .nav-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: var(--nav-hover);
      transform: scale(1.08);
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      transform: none;
    }

    .nav-btn svg {
      width: 24px;
      height: 24px;
    }

    /* Flashcard */
    .flashcard {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 44px 40px 36px;
      max-width: 600px;
      width: 100%;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      transition: box-shadow var(--transition);
      animation: fadeScaleIn 0.4s ease;
    }

    .flashcard .card-ref {
      position: absolute;
      top: 16px;
      left: 22px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .flashcard .question {
      font-size: 1.55rem;
      font-weight: 700;
      line-height: 1.45;
      color: var(--text-primary);
      margin-bottom: 28px;
      max-height: 260px;
      overflow-y: auto;
    }

    .flashcard .reveal-btn {
      font-size: 0.9rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      transition: color var(--transition);
      border: none;
      background: none;
      font-family: var(--font);
      padding: 6px 12px;
    }

    .flashcard .reveal-btn:hover {
      color: var(--accent);
    }

    /* Answer area */
    .answer-area {
      display: none;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    .answer-area.visible {
      display: block;
    }

    .answer-area .answer-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--success-text);
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .answer-area .explanation-link {
      font-size: 0.85rem;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      border: none;
      background: none;
      font-family: var(--font);
      transition: opacity var(--transition);
    }

    .answer-area .explanation-link:hover {
      opacity: 0.75;
    }

    .answer-area .explanation-text {
      display: none;
      margin-top: 12px;
      font-size: 0.88rem;
      line-height: 1.55;
      color: var(--text-secondary);
      background: var(--explanation-bg);
      border: 1px solid var(--explanation-border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      text-align: left;
      animation: fadeIn 0.35s ease;
    }

    .answer-area .explanation-text.visible {
      display: block;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 900px;
      padding: 10px 0 6px;
      flex-shrink: 0;
    }

    .reload-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      transition: color var(--transition), transform 0.5s ease;
    }

    .reload-btn:hover {
      color: var(--accent);
      transform: rotate(-180deg);
    }

    .reload-btn svg {
      width: 22px;
      height: 22px;
    }

    .progress-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--progress-bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--progress-fill);
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0%;
    }

    .progress-text {
      font-size: 0.82rem;
      color: var(--text-secondary);
      white-space: nowrap;
      font-weight: 500;
    }

    .star-icon {
      color: var(--star-color);
      display: flex;
      align-items: center;
      cursor: default;
    }

    .star-icon svg {
      width: 28px;
      height: 28px;
    }

    /* ===== END SCREEN ===== */
    #end-screen {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .end-box {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 52px 44px;
      box-shadow: var(--card-shadow);
      text-align: center;
      max-width: 480px;
      width: 90%;
      animation: fadeScaleIn 0.6s ease;
    }

    .end-box .trophy {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }

    .end-box h2 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .end-box .end-nickname {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .end-box .score-display {
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .end-box .score-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .end-box .score-message {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.6;
      padding: 14px 0;
      border-top: 1px solid var(--card-border);
    }

    .btn-replay {
      margin-top: 24px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--font);
      border: 2px solid var(--accent);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-replay:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeScaleIn {
      from {
        opacity: 0;
        transform: scale(0.94);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideLeft {
      from {
        opacity: 0;
        transform: translateX(40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideRight {
      from {
        opacity: 0;
        transform: translateX(-40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .flashcard {
        padding: 32px 22px 28px;
        min-height: 260px;
      }

      .flashcard .question {
        font-size: 1.2rem;
      }

      .nav-btn {
        width: 42px;
        height: 42px;
      }

      .card-area {
        gap: 10px;
      }

      .nickname-box {
        padding: 36px 24px;
      }

      .top-hint {
        font-size: 0.72rem;
      }
    }
  </style>
</head>

<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
    <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <circle cx="12" cy="12" r="5" />
      <line x1="12" y1="1" x2="12" y2="3" />
      <line x1="12" y1="21" x2="12" y2="23" />
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
      <line x1="1" y1="12" x2="3" y2="12" />
      <line x1="21" y1="12" x2="23" y2="12" />
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
    </svg>
    <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round" style="display:none;">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
    <span id="themeLabel">Modo claro</span>
  </button>

  <!-- ===== NICKNAME SCREEN ===== -->
  <div class="screen active" id="nickname-screen">
    <div class="nickname-box">
      <h1>Fundamentos del Diseño</h1>
      <p class="subtitle">Tarjetas didácticas · Gui Bonsiepe</p>
      <label for="nicknameInput">Tu nickname</label>
      <input type="text" id="nicknameInput" placeholder="123456789" maxlength="9" inputmode="numeric"
        autocomplete="off">
      <p class="hint">Ingresa un número de máximo 9 dígitos</p>
      <button class="btn-start" id="btnStart" disabled>Comenzar</button>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div class="screen" id="game-screen">
    <p class="top-hint">Presiona <kbd>Espacio</kbd> para voltear, <kbd>←</kbd> / <kbd>→</kbd> para navegar</p>

    <div class="card-area">
      <!-- Prev -->
      <button class="nav-btn" id="btnPrev" title="Anterior (←)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>

      <!-- Card -->
      <div class="flashcard" id="flashcard">
        <span class="card-ref" id="cardRef"></span>
        <p class="question" id="questionText"></p>
        <button class="reveal-btn" id="revealBtn">Ver respuesta</button>
        <div class="answer-area" id="answerArea">
          <div class="answer-text" id="answerText"></div>
          <button class="explanation-link" id="explanationLink">Explicación</button>
          <div class="explanation-text" id="explanationText"></div>
        </div>
      </div>

      <!-- Next -->
      <button class="nav-btn" id="btnNext" title="Siguiente (→)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <button class="reload-btn" id="btnReload" title="Reiniciar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
      </button>
      <div class="progress-wrapper">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">1 / 40 tarjetas</span>
      </div>
      <div class="star-icon" title="Puntuación">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z" />
        </svg>
      </div>
    </div>
  </div>

  <!-- ===== END SCREEN ===== -->
  <div class="screen" id="end-screen">
    <div class="end-box">
      <div class="trophy">🏆</div>
      <h2>¡Juego terminado!</h2>
      <p class="end-nickname" id="endNickname"></p>
      <div class="score-display" id="scoreDisplay"></div>
      <p class="score-label" id="scoreLabel"></p>
      <p class="score-message" id="scoreMessage"></p>
      <button class="btn-replay" id="btnReplay">Jugar de nuevo</button>
    </div>
  </div>

  <script>
    // ===== FLASHCARD DATA =====
    const FLASHCARDS = [
      { ref: 1, pregunta: "¿Cuál es el significado real del diseño según Gui Bonsiepe?", respuesta: "Ser un solucionador inteligente de problemas.", explicacion: "Bonsiepe busca rescatar al diseño de su reducción a un mero espectáculo mediático, devolviéndole su propósito central de resolver necesidades funcionales." },
      { ref: 2, pregunta: "Bonsiepe afirma que el diseño actual ha dejado de ser un solucionador de problemas para convertirse en un _____ _____.", respuesta: "evento mediático.", explicacion: "Se critica que hoy el diseño se use más como una herramienta de marketing y exhibición que como una disciplina de intervención crítica." },

      { ref: 37, pregunta: "Según Bonsiepe el diseño debe ser un agente de transformación especialmente para los _____.", respuesta: "dominados o menos favorecidos.", explicacion: "El diseño tiene una responsabilidad social de ayudar a quienes tienen menos poder en la sociedad." },
      { ref: 38, pregunta: "¿Qué término utiliza Bonsiepe para referirse al diseño centrado exclusivamente en el consumo y la imagen personal?", respuesta: "Diseño de estilo de vida (Life Style).", explicacion: "Esta etiqueta describe al diseño que prioriza el estatus y la identidad superficial sobre las necesidades reales." },
      { ref: 39, pregunta: "¿Qué característica define a una profesión en una sociedad tecnológicamente dinámica según el autor?", respuesta: "La capacidad de producir conocimientos propios.", explicacion: "Para seguir siendo relevante, una profesión debe generar su propia investigación y avances teóricos." },
      { ref: 40, pregunta: "El autor afirma que el diseño no es solo apariencia o emoción sino también _____.", respuesta: "usabilidad y solución de problemas.", explicacion: "La utilidad práctica de un diseño es tan importante como su impacto emocional o estético." }
    ];

    // ===== STATE =====
    let nickname = '';
    let currentIndex = 0;
    let revealed = new Set(); // indices where answer was revealed
    let explanationOpen = false;

    // ===== DOM REFS =====
    const $ = id => document.getElementById(id);
    const nicknameScreen = $('nickname-screen');
    const gameScreen = $('game-screen');
    const endScreen = $('end-screen');
    const nicknameInput = $('nicknameInput');
    const btnStart = $('btnStart');
    const btnPrev = $('btnPrev');
    const btnNext = $('btnNext');
    const flashcard = $('flashcard');
    const cardRef = $('cardRef');
    const questionText = $('questionText');
    const revealBtn = $('revealBtn');
    const answerArea = $('answerArea');
    const answerText = $('answerText');
    const explanationLink = $('explanationLink');
    const explanationText = $('explanationText');
    const progressFill = $('progressFill');
    const progressText = $('progressText');
    const btnReload = $('btnReload');
    const themeToggle = $('themeToggle');
    const iconSun = $('iconSun');
    const iconMoon = $('iconMoon');

    // ===== THEME =====
    function initTheme() {
      const saved = localStorage.getItem('flashcards-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
      updateThemeIcon();
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('flashcards-theme', next);
      updateThemeIcon();
    }
    function updateThemeIcon() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      iconSun.style.display = isDark ? 'block' : 'none';
      iconMoon.style.display = isDark ? 'none' : 'block';
      document.getElementById('themeLabel').textContent = isDark ? 'Modo claro' : 'Modo oscuro';
    }
    themeToggle.addEventListener('click', toggleTheme);
    initTheme();

    // ===== SCREENS =====
    function showScreen(screen) {
      [nicknameScreen, gameScreen, endScreen].forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    // ===== NICKNAME =====
    nicknameInput.addEventListener('input', () => {
      const val = nicknameInput.value.replace(/\D/g, '').slice(0, 9);
      nicknameInput.value = val;
      btnStart.disabled = val.length === 0;
    });
    nicknameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !btnStart.disabled) startGame();
    });
    btnStart.addEventListener('click', startGame);

    function startGame() {
      nickname = nicknameInput.value;
      currentIndex = 0;
      revealed = new Set();
      explanationOpen = false;
      showScreen(gameScreen);
      renderCard();
    }

    // ===== CARD RENDERING =====
    function renderCard(direction) {
      const card = FLASHCARDS[currentIndex];
      cardRef.textContent = `#${card.ref}`;
      questionText.textContent = card.pregunta;
      answerText.textContent = card.respuesta;
      explanationText.textContent = card.explicacion;

      // Reset state
      answerArea.classList.remove('visible');
      explanationText.classList.remove('visible');
      explanationLink.textContent = 'Explicación';
      revealBtn.style.display = 'block';
      explanationOpen = false;

      // If this card was already revealed, show answer
      if (revealed.has(currentIndex)) {
        showAnswer();
      }

      // Nav buttons
      btnPrev.disabled = currentIndex === 0;
      // btnNext always enabled to allow finishing

      // Progress
      const pct = ((currentIndex + 1) / FLASHCARDS.length) * 100;
      progressFill.style.width = pct + '%';
      progressText.textContent = `${currentIndex + 1} / ${FLASHCARDS.length} tarjetas`;

      // Animation
      if (direction) {
        flashcard.style.animation = 'none';
        flashcard.offsetHeight; // reflow
        flashcard.style.animation = direction === 'left' ? 'slideLeft 0.35s ease' : 'slideRight 0.35s ease';
      }
    }

    function showAnswer() {
      revealed.add(currentIndex);
      revealBtn.style.display = 'none';
      answerArea.classList.add('visible');
    }

    function toggleExplanation() {
      explanationOpen = !explanationOpen;
      explanationText.classList.toggle('visible', explanationOpen);
      explanationLink.textContent = explanationOpen ? 'Ocultar explicación' : 'Explicación';
    }

    // ===== NAVIGATION =====
    function goNext() {
      if (currentIndex < FLASHCARDS.length - 1) {
        currentIndex++;
        renderCard('left');
      } else {
        endGame();
      }
    }
    function goPrev() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCard('right');
      }
    }

    btnNext.addEventListener('click', goNext);
    btnPrev.addEventListener('click', goPrev);
    revealBtn.addEventListener('click', showAnswer);
    explanationLink.addEventListener('click', toggleExplanation);

    // ===== KEYBOARD =====
    document.addEventListener('keydown', e => {
      // Only handle keys when game screen is active
      if (!gameScreen.classList.contains('active')) return;

      if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
      else if (e.key === ' ') {
        e.preventDefault();
        if (!answerArea.classList.contains('visible')) {
          showAnswer();
        }
      }
    });

    // ===== RELOAD =====
    btnReload.addEventListener('click', () => {
      if (confirm('¿Reiniciar el juego? Se perderá tu progreso.')) {
        currentIndex = 0;
        revealed = new Set();
        renderCard();
      }
    });

    // ===== END GAME =====
    function endGame() {
      const total = FLASHCARDS.length;
      const notRevealed = total - revealed.size;
      const pct = Math.round((notRevealed / total) * 100);

      $('endNickname').textContent = `Jugador: ${nickname}`;
      $('scoreDisplay').textContent = `${notRevealed} / ${total}`;
      $('scoreLabel').textContent = `${pct}% de tarjetas respondidas sin ver la respuesta`;

      let msg = '';
      if (pct === 100) msg = '¡Perfecto! 🌟 Dominas completamente el tema.';
      else if (pct >= 80) msg = '¡Excelente! 🎯 Tienes un dominio muy alto.';
      else if (pct >= 60) msg = '¡Bien! 📚 Vas por buen camino, sigue estudiando.';
      else if (pct >= 40) msg = 'Regular. 💡 Necesitas repasar algunos conceptos.';
      else msg = '¡No te rindas! 🔄 Repasa el material y vuelve a intentarlo.';

      $('scoreMessage').textContent = msg;
      showScreen(endScreen);
    }

    // ===== REPLAY =====
    $('btnReplay').addEventListener('click', () => {
      nicknameInput.value = nickname;
      btnStart.disabled = false;
      showScreen(nicknameScreen);
    });
  </script>
