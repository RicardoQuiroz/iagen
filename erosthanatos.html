<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eros y Thanatos - Quiz Psicoanalítico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark {
            background-color: #0f172a;
            color: #f8fafc;
        }

        .light {
            background-color: #f8fafc;
            color: #1e293b;
        }

        .overlay-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            z-index: 20;
            pointer-events: none;
        }

        .btn-answer {
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="light min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Theme Toggle -->
    <button id="themeToggle" class="fixed top-6 right-6 p-3 rounded-full bg-gray-200 dark:bg-gray-700 hover:ring-2 ring-indigo-400 transition-all z-50">
        <span id="themeIcon">🌙</span>
    </button>

    <div id="app" class="w-full max-w-2xl bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 transition-colors border border-gray-100 dark:border-gray-700">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold uppercase tracking-widest text-indigo-700 dark:text-indigo-400 mb-4">Eros y Thanatos</h1>
            <div id="progressContainer" class="w-full bg-gray-200 dark:bg-gray-700 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-indigo-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="counterText" class="text-sm mt-3 font-medium text-gray-500 dark:text-gray-400">Pregunta 0 de 0</p>
        </header>

        <!-- Main Content Area -->
        <main id="gameContent" class="fade-in min-h-[200px] flex flex-col justify-center">
            <!-- Questions and buttons will be injected here -->
        </main>

        <!-- Footer Actions -->
        <footer class="mt-10 flex justify-between items-center border-t border-gray-100 dark:border-gray-700 pt-6">
            <button id="restartBtn" class="px-4 py-2 text-sm font-semibold text-gray-400 hover:text-red-500 transition-colors uppercase tracking-wider">
                Reiniciar
            </button>
            <div id="scoreDisplay" class="font-bold text-lg text-indigo-600 dark:text-indigo-400 hidden">
                Puntaje: <span id="currentScore">0</span>
            </div>
        </footer>
    </div>

    <script>
        // Data according to the image rules: 1 = FALSE, 2 = TRUE
        const questionsData = [
            { text: "¿En el análisis del psique, el método de Freud fue el de los símbolos?", correct: 1 },
            { text: "¿El método de Campbell era mediante el psicoanálisis?", correct: 1 },
            { text: "¿El método de Jung fue mediante los sueños?", correct: 2 },
            { text: "¿El psicoanálisis define nuestras motivaciones humanas mediante el Eros y el Thanatos?", correct: 2 },
            { text: "¿El 'Eros' en las publicidades quiere decir de forma inconsciente que es la conservación de la vida?", correct: 2 },
            { text: "Respecto a la publicidad de ciertas enfermedades, o en este caso la pandemia, se puede trabajar con el Eros y Thanatos.", correct: 2 },
            { text: "¿El Thanatos también podría representar a la sexualidad en imágenes publicitarias?", correct: 1 },
            { text: "Las publicidades con sonrisas, fiestas, en sí, con un aura positiva, ¿es considerada como Eros?", correct: 2 },
            { text: "De acuerdo a Hebert Marcus, inspirado en Freud, el hombre tiene el impulso a estar en una realidad extrema.", correct: 2 },
            { text: "La naturaleza es considerada Thanatos.", correct: 1 }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswering = false;

        const gameContent = document.getElementById('gameContent');
        const progressBar = document.getElementById('progressBar');
        const counterText = document.getElementById('counterText');
        const themeToggle = document.getElementById('themeToggle');
        const restartBtn = document.getElementById('restartBtn');

        // Theme management
        let isDark = false;
        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            document.body.className = isDark ? 'dark' : 'light';
            document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
        });

        function shuffleQuestions() {
            currentQuestions = [...questionsData].sort(() => Math.random() - 0.5);
        }

        function initGame() {
            shuffleQuestions();
            currentIndex = 0;
            score = 0;
            isAnswering = false;
            renderQuestion();
        }

        function renderQuestion() {
            if (currentIndex >= currentQuestions.length) {
                showFinalScore();
                return;
            }

            const q = currentQuestions[currentIndex];
            const progress = (currentIndex / currentQuestions.length) * 100;
            progressBar.style.width = `${progress}%`;
            counterText.innerText = `Pregunta ${currentIndex + 1} de ${currentQuestions.length}`;

            gameContent.innerHTML = `
                <div class="space-y-8 fade-in">
                    <h2 class="text-xl md:text-2xl font-semibold leading-relaxed text-center px-2 text-gray-800 dark:text-gray-100">
                        ${q.text}
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button onclick="handleAnswer(1)" class="btn-answer group p-6 rounded-xl border-2 border-gray-200 dark:border-gray-700 hover:border-indigo-500 dark:hover:border-indigo-400 text-gray-700 dark:text-gray-200 text-xl font-bold transition-all flex justify-center items-center h-24 bg-gray-50 dark:bg-gray-900/50">
                            <span id="label-1">FALSO</span>
                            <div id="overlay-1" class="hidden overlay-icon"></div>
                        </button>
                        
                        <button onclick="handleAnswer(2)" class="btn-answer group p-6 rounded-xl border-2 border-gray-200 dark:border-gray-700 hover:border-indigo-500 dark:hover:border-indigo-400 text-gray-700 dark:text-gray-200 text-xl font-bold transition-all flex justify-center items-center h-24 bg-gray-50 dark:bg-gray-900/50">
                            <span id="label-2">VERDADERO</span>
                            <div id="overlay-2" class="hidden overlay-icon"></div>
                        </button>
                    </div>
                </div>
            `;
        }

        window.handleAnswer = (selected) => {
            if (isAnswering) return;
            isAnswering = true;

            const q = currentQuestions[currentIndex];
            const isCorrect = selected === q.correct;
            
            if (isCorrect) score++;

            const overlay = document.getElementById(`overlay-${selected}`);
            const label = document.getElementById(`label-${selected}`);
            
            overlay.classList.remove('hidden');
            overlay.innerHTML = isCorrect ? '✅' : '❌';
            label.style.opacity = '0.1';

            setTimeout(() => {
                currentIndex++;
                isAnswering = false;
                renderQuestion();
            }, 1000);
        };

        function showFinalScore() {
            progressBar.style.width = `100%`;
            const percentage = (score / currentQuestions.length) * 100;
            let message = percentage >= 70 ? "Excelente comprensión." : "Reflexiona sobre los conceptos e intenta de nuevo.";

            gameContent.innerHTML = `
                <div class="text-center space-y-6 fade-in py-4">
                    <h2 class="text-3xl font-bold text-gray-800 dark:text-white">Resultados</h2>
                    <div class="py-6">
                        <p class="text-7xl font-black text-indigo-600 dark:text-indigo-400">${score} / ${currentQuestions.length}</p>
                        <p class="text-lg mt-6 text-gray-600 dark:text-gray-300 italic">"${message}"</p>
                    </div>
                    <button onclick="initGame()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-indigo-500/30 transition-all transform hover:-translate-y-1">
                        Reiniciar Experiencia
                    </button>
                </div>
            `;
            counterText.innerText = "Sesión finalizada";
        }

        restartBtn.addEventListener('click', initGame);
        window.onload = initGame;
    </script>
</body>
</html>
