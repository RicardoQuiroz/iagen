<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Recordatorios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f4f8; font-family: sans-serif; padding: 15px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
    .task-list { max-height: 400px; overflow-y: auto; }
    .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 500px;">
    
    <div class="card p-4 mt-3">
      <h4 class="text-center mb-3">🎙️ Nueva Alarma</h4>
      <form id="formAlarma">
        <input type="text" class="form-control mb-3" id="tarea" placeholder="Dícta tu tarea aquí..." required>
        
        <select class="form-select mb-3" id="tipo" onchange="toggleFecha()">
          <option value="Fecha">Con Fecha Precisa</option>
          <option value="Todo">Sin Fecha (Solo lista)</option>
        </select>
        
        <input type="datetime-local" class="form-control mb-3" id="fecha">
        
        <button type="button" class="btn btn-primary w-100" id="btnGuardar" onclick="enviarDatos()">Guardar Alarma</button>
      </form>
    </div>

    <div class="card p-3">
      <h5 class="text-center mb-3">Mis Recordatorios</h5>
      <button class="btn btn-outline-secondary btn-sm mb-2" onclick="cargarTablero()">🔄 Actualizar Tabla</button>
      <div id="tablero" class="task-list text-center text-muted">Cargando...</div>
    </div>

  </div>

  <script>
    // 👇 PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT 👇
    const API_URL = "https://script.google.com/macros/s/AKfycbyBJumQZ9d2iuQtee9CGf1BsU-dlfHYhmwco2ZpJKUGvmkldU5KOvy_B3ZtrlOuxsIphA/exec";

    window.onload = cargarTablero;

    function toggleFecha() {
      document.getElementById('fecha').style.display = document.getElementById('tipo').value === 'Fecha' ? 'block' : 'none';
    }

    // OBTENER DATOS (GET)
    async function cargarTablero() {
      const tablero = document.getElementById('tablero');
      tablero.innerHTML = "Cargando conectándose a Google...";
      try {
        const respuesta = await fetch(API_URL);
        const datos = await respuesta.json();
        
        if(datos.length === 0) { tablero.innerHTML = "No hay alarmas pendientes."; return; }
        
        tablero.innerHTML = datos.map(item => `
          <div class="task-item">
            <div>
              <strong>${item.tarea}</strong><br>
              <small style="color:${item.tipo==='Fecha'?'#28a745':'#f39c12'}">
                ${item.tipo === 'Fecha' ? new Date(item.fecha).toLocaleString() : '📝 Pendiente'}
              </small>
            </div>
            <button class="btn btn-sm btn-danger" onclick="eliminarAlarma('${item.id}', '${item.calendarId}')">X</button>
          </div>
        `).join('');
      } catch (error) {
        tablero.innerHTML = "No se pudo cargar. Revisa que el enlace de Apps Script sea el de 'Cualquier persona' y que hayas puesto la URL correcta.";
      }
    }

    // ENVIAR DATOS (POST)
    async function enviarDatos() {
        const btn = document.getElementById('btnGuardar');
        btn.innerText = "Guardando..."; btn.disabled = true;

        const payload = {
            action: "save",
            tarea: document.getElementById('tarea').value,
            tipo: document.getElementById('tipo').value,
            fecha: document.getElementById('fecha').value
        };

        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload) // Evitamos el modo 'no-cors' para recibir respuesta
            });
            document.getElementById('formAlarma').reset();
            toggleFecha();
            cargarTablero();
        } catch (e) {
            alert("Se guardó en segundo plano o hubo un error de conexión.");
        }
        btn.innerText = "Guardar Alarma"; btn.disabled = false;
    }

    // ELIMINAR DATOS (POST)
    async function eliminarAlarma(id, calendarId) {
        if(!confirm("¿Borrar estra alarma?")) return;
        
        const payload = { action: "delete", id: id, calendarId: calendarId };
        
        document.getElementById('tablero').innerHTML = "Borrando...";
        try {
            await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            cargarTablero();
        } catch (e) {
            alert("Error al borrar");
        }
    }
  </script>
</body>
</html>
